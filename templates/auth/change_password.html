<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - Financor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-lg shadow-lg">
            <div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                    Cambiar Contraseña
                </h2>
            </div>
            <form class="mt-8 space-y-6" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="rounded-md shadow-sm -space-y-px">
                    <div>
                        <label for="current_password" class="sr-only">Contraseña Actual</label>
                        <input id="current_password" name="current_password" type="password" required
                            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                            placeholder="Contraseña Actual">
                    </div>
                    <div>
                        <label for="new_password" class="sr-only">Nueva Contraseña</label>
                        <input id="new_password" name="new_password" type="password" required
                            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                            placeholder="Nueva Contraseña">
                    </div>
                    <div>
                        <label for="confirm_password" class="sr-only">Confirmar Nueva Contraseña</label>
                        <input id="confirm_password" name="confirm_password" type="password" required
                            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                            placeholder="Confirmar Nueva Contraseña">
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cambiar Contraseña
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
