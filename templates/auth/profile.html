{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gray-100 py-6 flex flex-col justify-center sm:py-12">
    <div class="relative py-3 sm:max-w-xl sm:mx-auto">
        <div class="relative px-4 py-10 bg-white shadow-lg sm:rounded-3xl sm:p-20">
            <div class="max-w-md mx-auto">
                <div class="divide-y divide-gray-200">
                    <div class="py-8 text-base leading-6 space-y-4 text-gray-700 sm:text-lg sm:leading-7">
                        <div class="flex items-center justify-center mb-8">
                            <div class="w-24 h-24 rounded-full bg-indigo-100 flex items-center justify-center">
                                <svg class="w-12 h-12 text-indigo-500" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <span class="font-semibold">Usuario:</span>
                                <span>{{ user.username }}</span>
                            </div>

                            <div class="flex justify-between items-center">
                                <span class="font-semibold">Email:</span>
                                <span>{{ user.email }}</span>
                            </div>

                            <div class="flex justify-between items-center">
                                <span class="font-semibold">Rol:</span>
                                <span
                                    class="px-2 py-1 text-sm rounded-full {% if user.role == 'admin' %}bg-purple-100 text-purple-800{% else %}bg-blue-100 text-blue-800{% endif %}">
                                    {{ user.role|title }}
                                </span>
                            </div>

                            <div class="flex justify-between items-center">
                                <span class="font-semibold">Último inicio de sesión:</span>
                                <span>{{ user.last_login.strftime('%d/%m/%Y %H:%M') if user.last_login else 'Nunca'
                                    }}</span>
                            </div>
                        </div>

                        <div class="pt-6 space-y-4">
                            <a href="{{ url_for('auth.change_password') }}"
                                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                Cambiar Contraseña
                            </a>

                            <a href="{{ url_for('auth.logout') }}"
                                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                                Cerrar Sesión
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
